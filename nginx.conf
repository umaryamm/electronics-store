server {
    listen 80;
    server_name jelectronics.store www.jelectronics.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name jelectronics.store www.jelectronics.store;

    ssl_certificate /etc/letsencrypt/live/jelectronics.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jelectronics.store/privkey.pem;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://admin:3001/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
    }
}